server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8101
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: school-service
          uri: http://localhost:8102
          predicates:
            - Path=/api/school/**
          filters:
            - StripPrefix=1
        - id: student-service
          uri: http://localhost:8103
          predicates:
            - Path=/api/student/**
          filters:
            - StripPrefix=1
        - id: admission-service
          uri: http://localhost:8104
          predicates:
            - Path=/api/admission/**
          filters:
            - StripPrefix=1
